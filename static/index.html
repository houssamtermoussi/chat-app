<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Go</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1a1b26;
      color: #c0caf5;
    }

    header {
      width: 100%;
      max-width: 640px;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #3b4261;
    }

    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    #status {
      margin: 0.35rem 0 0;
      font-size: 0.85rem;
      color: #565f89;
    }

    #status.connected { color: #9ece6a; }
    #status.disconnected { color: #f7768e; }

    #network-hint {
      margin: 0.5rem 0 0;
      padding: 0.6rem 0.75rem;
      font-size: 0.8rem;
      line-height: 1.45;
      background: #24283b;
      border-radius: 6px;
      border: 1px solid #3b4261;
      color: #a9b1d6;
    }

    #network-hint a {
      color: #7aa2f7;
      word-break: break-all;
    }

    #network-hint strong { color: #c0caf5; }

    main {
      width: 100%;
      max-width: 640px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 1.25rem 1.25rem;
    }

    #pseudo-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }

    #pseudo-row input {
      flex: 1;
    }

    #messages {
      flex: 1;
      min-height: 280px;
      max-height: 50vh;
      overflow-y: auto;
      list-style: none;
      margin: 0;
      padding: 0.75rem;
      background: #24283b;
      border-radius: 8px;
      border: 1px solid #3b4261;
    }

    #messages li {
      margin-bottom: 0.5rem;
      line-height: 1.4;
      word-break: break-word;
    }

    #messages li .author {
      font-weight: 600;
      color: #7aa2f7;
      margin-right: 0.35rem;
    }

    #messages li.system {
      color: #565f89;
      font-size: 0.9rem;
      font-style: italic;
    }

    form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    input, button {
      font: inherit;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #3b4261;
      background: #24283b;
      color: #c0caf5;
    }

    input:focus {
      outline: 2px solid #7aa2f7;
      outline-offset: 1px;
    }

    #message-input { flex: 1; }

    button {
      cursor: pointer;
      background: #7aa2f7;
      color: #1a1b26;
      border: none;
      font-weight: 600;
    }

    button:hover { background: #89b4fa; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chat Go</h1>
    <p id="status">Connexion…</p>
    <div id="network-hint">Chargement des adresses réseau…</div>
  </header>

  <main>
    <div id="pseudo-row">
      <input type="text" id="pseudo" placeholder="Ton pseudo" maxlength="24" autocomplete="off">
      <button type="button" id="pseudo-btn">Valider</button>
    </div>

    <ul id="messages"></ul>

    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Écris un message…" maxlength="500" disabled autocomplete="off">
      <button type="submit" id="send-btn" disabled>Envoyer</button>
    </form>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const networkHintEl = document.getElementById("network-hint");
    const messagesEl = document.getElementById("messages");
    const pseudoInput = document.getElementById("pseudo");
    const pseudoBtn = document.getElementById("pseudo-btn");
    const form = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");

    let pseudo = localStorage.getItem("chat-pseudo") || "";
    if (pseudo) pseudoInput.value = pseudo;

    function addMessage(text, className = "") {
      const li = document.createElement("li");
      if (className) li.className = className;
      li.textContent = text;
      messagesEl.appendChild(li);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addChatLine(author, text) {
      const li = document.createElement("li");
      const span = document.createElement("span");
      span.className = "author";
      span.textContent = author + " :";
      li.appendChild(span);
      li.appendChild(document.createTextNode(" " + text));
      messagesEl.appendChild(li);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setConnected(connected) {
      statusEl.textContent = connected ? "Connecté" : "Déconnecté";
      statusEl.className = connected ? "connected" : "disconnected";
      messageInput.disabled = !connected;
      sendBtn.disabled = !connected;
    }

    function formatOutgoing(text) {
      const name = pseudo.trim() || "Anonyme";
      return name + ": " + text;
    }

    function parseIncoming(raw) {
      const i = raw.indexOf(": ");
      if (i === -1) return { author: "?", text: raw };
      return {
        author: raw.slice(0, i),
        text: raw.slice(i + 2),
      };
    }

    async function loadNetworkHint() {
      try {
        const res = await fetch("/api/info");
        const info = await res.json();
        const onLocalhost = location.hostname === "localhost" || location.hostname === "127.0.0.1";

        if (!info.on_wifi) {
          networkHintEl.innerHTML =
            "<strong>Autre appareil :</strong> connecte ce PC au Wi‑Fi, relance le serveur, puis utilise l’IP affichée dans le terminal.";
          return;
        }

        const links = info.urls
          .map((u) => `<a href="${u}">${u}</a>`)
          .join("<br>");

        if (onLocalhost) {
          networkHintEl.innerHTML =
            "<strong>Sur téléphone / autre PC (même Wi‑Fi) :</strong> ouvre une de ces adresses — pas <code>localhost</code> :<br>" +
            links;
        } else {
          networkHintEl.innerHTML =
            "<strong>Tu es déjà sur le réseau.</strong> Partage cette adresse avec l’autre appareil :<br>" +
            `<a href="${location.origin}">${location.origin}</a>`;
        }
      } catch {
        networkHintEl.textContent = "Impossible de charger les adresses réseau.";
      }
    }

    loadNetworkHint();

    const ws = new WebSocket(
      (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws"
    );

    ws.onopen = () => {
      setConnected(true);
      addMessage("Tu es connecté au salon.", "system");
    };

    ws.onclose = () => {
      setConnected(false);
      addMessage("Connexion fermée.", "system");
    };

    ws.onerror = () => {
      addMessage("Erreur de connexion.", "system");
    };

    ws.onmessage = (event) => {
      const { author, text } = parseIncoming(event.data);
      addChatLine(author, text);
    };

    pseudoBtn.addEventListener("click", () => {
      pseudo = pseudoInput.value.trim();
      localStorage.setItem("chat-pseudo", pseudo);
      addMessage("Pseudo enregistré : " + (pseudo || "Anonyme"), "system");
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;

      ws.send(formatOutgoing(text));
      messageInput.value = "";
      messageInput.focus();
    });
  </script>
</body>
</html>
